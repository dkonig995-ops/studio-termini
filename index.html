<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3D2436">
<title>Studio Termini</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233D2436'/%3E%3Cpath d='M50 20c-16 0-27 14-27 32 0 12 9 21 27 28 18-7 27-16 27-28 0-18-11-32-27-32z' fill='%23C4718C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FBF5F1;
    --plum:#3D2436;
    --plum-soft:#6b4f5e;
    --rose:#C4718C;
    --rose-deep:#a8546e;
    --gold:#B08D57;
    --sage:#7C8B6F;
    --amber:#D98F4E;
    --red:#C25450;
    --card:#FFFFFF;
    --line:#EEE3DE;
    --shadow: 0 2px 12px rgba(61,36,54,0.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--ivory); color:var(--plum); font-family:'Manrope',sans-serif; height:100%; overscroll-behavior:none;}
  body{ -webkit-user-select:none; user-select:none; }
  input, textarea{ -webkit-user-select:text; user-select:text; }
  #app{ max-width:520px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; }

  /* Header */
  header{
    padding: calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
    background: var(--plum);
    color: var(--ivory);
    flex-shrink:0;
    position:relative;
  }
  header .top-row{ display:flex; justify-content:space-between; align-items:baseline; }
  header h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:22px; margin:0; letter-spacing:.2px;
  }
  header .date-sub{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:#e3c9d1; margin-top:4px; text-transform:capitalize; }
  header .gear{ font-size:19px; opacity:.85; background:none; border:none; color:var(--ivory); padding:4px; }

  main{ flex:1; overflow-y:auto; padding: 14px 16px calc(96px + env(safe-area-inset-bottom,0px)); }

  /* Bottom nav */
  nav.tabbar{
    position:absolute; bottom:0; left:0; right:0;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border-top:1px solid var(--line);
    display:flex; justify-content:space-around;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom,0px));
  }
  nav.tabbar button{
    background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#b39aa4; font-family:'Manrope'; font-size:10.5px; font-weight:600; padding:4px 8px; flex:1;
  }
  nav.tabbar button.active{ color:var(--rose-deep); }
  nav.tabbar .ico{ font-size:19px; line-height:1; }

  /* FAB */
  .fab{
    position:absolute; right:18px; bottom:calc(80px + env(safe-area-inset-bottom,0px));
    width:56px; height:58px;
    background:var(--rose); color:white; border:none;
    border-radius: 46% 46% 46% 46% / 58% 58% 42% 42%;
    box-shadow:0 6px 16px rgba(196,113,140,0.5);
    font-size:26px; display:flex; align-items:center; justify-content:center;
    transform: rotate(-8deg);
  }
  .fab:active{ transform: rotate(-8deg) scale(0.94); }

  /* Section titles */
  .section-title{
    font-family:'Fraunces', serif; font-size:19px; font-weight:600; margin: 4px 2px 10px; color:var(--plum);
  }
  .eyebrow{
    font-family:'IBM Plex Mono'; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--gold); margin-bottom:2px; display:block;
  }

  /* Cards */
  .card{
    background:var(--card); border-radius:16px; padding:14px 15px; margin-bottom:10px;
    box-shadow:var(--shadow); border-left:4px solid var(--rose);
  }
  .card.status-done{ border-left-color:var(--sage); background:#F4F8F1; }
  .card.status-cancelled{ border-left-color:var(--red); background:#FDF3F2; opacity:.8; }
  .card.status-cancelled .client-name{ text-decoration:line-through; color:var(--plum-soft); }
  .cat-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .cat-dot.mani{ background:var(--rose); }
  .cat-dot.pedi{ background:var(--gold); }
  .cat-dot.other{ background:var(--sage); }
  .card .row1{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .card .time{ font-family:'IBM Plex Mono'; font-weight:600; font-size:15px; color:var(--plum); white-space:nowrap;}
  .card .client-name{ font-weight:700; font-size:15.5px; margin:2px 0 2px; }
  .card .svc{ font-size:13px; color:var(--plum-soft); }
  .card .price{ font-family:'IBM Plex Mono'; font-weight:600; color:var(--gold); font-size:14px; }
  .card .tags{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .chip{ font-size:11px; padding:4px 9px; border-radius:20px; background:#F4E9EC; color:var(--rose-deep); font-weight:600; border:none; }
  .chip.ghost{ background:#F1EEE9; color:var(--plum-soft); }
  .chip.warn{ background:#FBE7D4; color:#8a5620; }
  .chip.danger{ background:#FADBD9; color:var(--red); }

  .empty{ text-align:center; padding:50px 20px; color:var(--plum-soft); }
  .empty .big{ font-size:34px; display:block; margin-bottom:10px; }
  .empty p{ font-size:14px; line-height:1.5; margin:4px 0; }

  /* Day switcher */
  .day-switch{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; }
  .day-switch button{ background:var(--card); border:1px solid var(--line); border-radius:12px; width:38px; height:38px; font-size:16px; color:var(--plum); flex-shrink:0; }
  .day-switch .lbl{ flex:1; text-align:center; font-family:'Fraunces'; font-weight:600; font-size:15px; text-transform:capitalize; }
  .day-switch .today-btn{ font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--rose-deep); background:none; border:1px solid var(--rose); border-radius:20px; width:auto; height:auto; padding:6px 10px; font-weight:600; }

  /* search */
  .search-bar{ width:100%; padding:11px 14px; border-radius:12px; border:1px solid var(--line); background:var(--card); font-size:14px; margin-bottom:12px; font-family:'Manrope'; color:var(--plum); }
  .search-bar::placeholder{ color:#c3aab5; }

  /* list rows */
  .list-row{ background:var(--card); border-radius:14px; padding:13px 14px; margin-bottom:8px; box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .list-row .name{ font-weight:700; font-size:14.5px; }
  .list-row .meta{ font-size:12px; color:var(--plum-soft); margin-top:2px; }
  .list-row .right{ text-align:right; }
  .list-row .num{ font-family:'IBM Plex Mono'; font-weight:600; font-size:14px; }
  .list-row.lowstock{ border:1.5px solid var(--amber); background:#FFF9F1; }
  .list-row.outstock{ border:1.5px solid var(--red); background:#FFF3F2; }

  /* modal */
  .overlay{ position:fixed; inset:0; background:rgba(61,36,54,0.45); display:flex; align-items:flex-end; z-index:50; }
  .sheet{ background:var(--ivory); width:100%; max-width:520px; margin:0 auto; border-radius:22px 22px 0 0; max-height:88vh; overflow-y:auto; padding:18px 20px calc(24px + env(safe-area-inset-bottom,0px)); animation:up .22s ease-out; }
  @keyframes up{ from{ transform:translateY(40px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .sheet h2{ font-family:'Fraunces'; font-size:19px; margin:0 0 14px; display:flex; justify-content:space-between; align-items:center; }
  .sheet h2 button{ background:none; border:none; font-size:20px; color:var(--plum-soft); }
  label{ font-size:12px; font-weight:700; color:var(--plum-soft); display:block; margin:14px 0 6px; text-transform:uppercase; letter-spacing:.04em; font-family:'IBM Plex Mono'; }
  label:first-of-type{ margin-top:2px; }
  input[type=text], input[type=number], input[type=date], input[type=time], input[type=tel], select, textarea{
    width:100%; padding:11px 13px; border-radius:11px; border:1px solid var(--line); background:var(--card);
    font-size:15px; font-family:'Manrope'; color:var(--plum);
  }
  textarea{ min-height:64px; resize:vertical; font-family:'Manrope'; }
  .row2{ display:flex; gap:10px; }
  .row2 > div{ flex:1; }
  .btn{ width:100%; padding:13px; border-radius:13px; border:none; font-weight:700; font-size:14.5px; margin-top:18px; }
  .btn.primary{ background:var(--rose); color:white; }
  .btn.secondary{ background:var(--card); color:var(--plum); border:1px solid var(--line); margin-top:8px; }
  .btn.danger-text{ background:none; color:var(--red); font-weight:600; font-size:13px; margin-top:14px; padding:6px; }
  .btn.gold{ background:var(--gold); color:white; }
  .service-pick{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .service-pick .opt{ padding:9px 13px; border-radius:12px; border:1.5px solid var(--line); background:var(--card); font-size:13px; font-weight:600; color:var(--plum-soft); }
  .service-pick .opt.sel{ border-color:var(--rose); color:var(--rose-deep); background:#FBEFF1; }
  .helper{ font-size:11.5px; color:var(--plum-soft); margin-top:6px; line-height:1.4; }

  /* stats */
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-card{ background:var(--card); border-radius:16px; padding:14px; box-shadow:var(--shadow); }
  .stat-card .n{ font-family:'IBM Plex Mono'; font-size:22px; font-weight:600; color:var(--rose-deep); }
  .stat-card .l{ font-size:11.5px; color:var(--plum-soft); margin-top:2px; }
  .bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .bar-row .bl{ font-size:11.5px; width:34px; color:var(--plum-soft); font-family:'IBM Plex Mono'; flex-shrink:0;}
  .bar-track{ flex:1; height:8px; background:#F1E7E4; border-radius:6px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--rose); border-radius:6px; }
  .bar-row .bv{ font-family:'IBM Plex Mono'; font-size:11.5px; width:50px; text-align:right; color:var(--plum); flex-shrink:0;}

  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--plum); color:white; padding:11px 18px; border-radius:30px; font-size:13px; font-weight:600; z-index:80; box-shadow:0 6px 20px rgba(0,0,0,.2); max-width:86%; text-align:center; }

  .client-hist{ background:var(--card); border-radius:14px; padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow); }
  .client-hist .h1{ display:flex; justify-content:space-between; font-size:13px; font-weight:700;}
  .client-hist .h2{ font-size:11.5px; color:var(--plum-soft); margin-top:3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="top-row">
      <h1 id="salonName">Studio Termini</h1>
      <button class="gear" onclick="openSettings()">⚙️</button>
    </div>
    <div class="date-sub" id="headerDate"></div>
  </header>
  <main id="main"></main>
  <button class="fab" id="fabBtn">+</button>
  <nav class="tabbar">
    <button data-tab="termini" class="active"><span class="ico">📅</span>Termini</button>
    <button data-tab="klijenti"><span class="ico">👤</span>Klijentice</button>
    <button data-tab="usluge"><span class="ico">💅</span>Usluge</button>
    <button data-tab="zalihe"><span class="ico">🧴</span>Zalihe</button>
    <button data-tab="pregled"><span class="ico">📊</span>Pregled</button>
  </nav>
</div>

<script>
/* ===================== STORAGE ===================== */
const DB_KEY = 'studioTerminiData_v1';
function loadDB(){
  const raw = localStorage.getItem(DB_KEY);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return seedData();
}
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function seedData(){
  return {
    salonName: 'Studio Termini',
    services: [
      {id:uid(), name:'Klasična manikura', price:12, duration:45, cat:'mani'},
      {id:uid(), name:'Gel lak (ruke)', price:20, duration:60, cat:'mani'},
      {id:uid(), name:'Klasična pedikura', price:18, duration:60, cat:'pedi'},
      {id:uid(), name:'Gel lak (noge)', price:25, duration:75, cat:'pedi'},
      {id:uid(), name:'Nadogradnja noktiju', price:35, duration:120, cat:'other'},
    ],
    clients: [],
    appointments: [],
    inventory: [
      {id:uid(), name:'Gel lak - baza', qty:4, unit:'kom', low:2},
      {id:uid(), name:'Gel lak - top coat', qty:3, unit:'kom', low:2},
      {id:uid(), name:'Aceton za skidanje', qty:1, unit:'L', low:1},
      {id:uid(), name:'Pilice za nokte', qty:15, unit:'kom', low:5},
    ]
  };
}
let DB = loadDB();

/* If we were opened via the calendar-redirect link (?addcal=...), immediately
   navigate to the data: URI in this same tab — this only works reliably when
   running inside real Safari (which is why we route through a real https link first). */
(function checkCalRedirect(){
  const params = new URLSearchParams(window.location.search);
  const addcal = params.get('addcal');
  if(addcal){
    window.location.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(addcal);
  }
})();

/* ===================== HELPERS ===================== */
const DAYS = ['nedjelja','ponedjeljak','utorak','srijeda','četvrtak','petak','subota'];
const MONTHS = ['siječnja','veljače','ožujka','travnja','svibnja','lipnja','srpnja','kolovoza','rujna','listopada','studenoga','prosinca'];
function fmtDateLabel(d){
  return `${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]}`;
}
function toISODate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function euro(n){ return (Math.round(n*100)/100).toFixed(2).replace('.',',') + ' €'; }
function pad(n){ return n.toString().padStart(2,'0'); }
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
}
function clientById(id){ return DB.clients.find(c=>c.id===id); }
function serviceById(id){ return DB.services.find(s=>s.id===id); }
function itemById(id){ return DB.inventory.find(i=>i.id===id); }
function findOverlap(date, time, duration, excludeId){
  const [h,m] = time.split(':').map(Number);
  const startMin = h*60+m;
  const endMin = startMin + (duration||30);
  return DB.appointments.find(a=>{
    if(a.id===excludeId) return false;
    if(a.date!==date) return false;
    if(a.status==='otkazano') return false;
    const [ah,am] = a.time.split(':').map(Number);
    const aStart = ah*60+am;
    const aEnd = aStart + (a.duration||30);
    return startMin < aEnd && endMin > aStart;
  });
}

let currentDay = new Date(); currentDay.setHours(0,0,0,0);
let activeTab = 'termini';

/* ===================== ICS EXPORT ===================== */
function makeICS(appt){
  const client = clientById(appt.clientId);
  const svc = serviceById(appt.serviceId);
  const [h,m] = appt.time.split(':').map(Number);
  const start = new Date(appt.date+'T'+appt.time+':00');
  const end = new Date(start.getTime() + (appt.duration||30)*60000);
  function fmt(d){
    return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
  }
  const summary = `${client?client.name:'Klijentica'} — ${svc?svc.name:'Termin'}`;
  const desc = `Usluga: ${svc?svc.name:''}\\nCijena: ${svc?euro(appt.price):''}\\nTelefon: ${client?client.phone||'':''}\\nBilješka: ${(appt.note||'').replace(/\n/g,' ')}`;
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//StudioTermini//HR','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:'+appt.id+'@studiotermini',
    'DTSTAMP:'+fmt(new Date()),
    'DTSTART:'+fmt(start),
    'DTEND:'+fmt(end),
    'SUMMARY:'+summary,
    'DESCRIPTION:'+desc,
    'BEGIN:VALARM','TRIGGER:-PT30M','ACTION:DISPLAY','DESCRIPTION:Podsjetnik - termin za 30 min','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  return ics;
}
function icsDataUri(appt){
  return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(makeICS(appt));
}
function icsCalLink(appt){
  return 'x-safari-' + location.origin + location.pathname + '?addcal=' + encodeURIComponent(makeICS(appt));
}
function downloadICS(appt){
  window.location.href = icsDataUri(appt);
}

/* ===================== RENDER: ROUTER ===================== */
const mainEl = document.getElementById('main');
function render(){
  document.getElementById('salonName').textContent = DB.salonName;
  document.getElementById('headerDate').textContent = fmtDateLabel(new Date());
  document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===activeTab));
  if(activeTab==='termini') renderTermini();
  else if(activeTab==='klijenti') renderKlijenti();
  else if(activeTab==='usluge') renderUsluge();
  else if(activeTab==='zalihe') renderZalihe();
  else if(activeTab==='pregled') renderPregled();
}

/* ===================== TAB: TERMINI ===================== */
function renderTermini(){
  const iso = toISODate(currentDay);
  const dayAppts = DB.appointments.filter(a=>a.date===iso).sort((a,b)=>a.time.localeCompare(b.time));
  const isToday = toISODate(new Date())===iso;
  let html = `<div class="day-switch">
    <button onclick="shiftDay(-1)">‹</button>
    <div class="lbl">${fmtDateLabel(currentDay)}${isToday?' <span style="color:var(--rose-deep); font-family:\'IBM Plex Mono\'; font-size:11px;">(danas)</span>':''}</div>
    <button onclick="shiftDay(1)">›</button>
  </div>`;
  if(!isToday) html += `<button class="today-btn" style="margin-bottom:12px;" onclick="goToday()">‹ Vrati na danas</button>`;

  if(dayAppts.length===0){
    html += `<div class="empty"><span class="big">🗓️</span><p>Nema termina za ovaj dan.</p><p>Dodirni + za novi termin.</p></div>`;
  } else {
    dayAppts.forEach(a=>{
      const c = clientById(a.clientId); const s = serviceById(a.serviceId);
      const statusClass = a.status==='odrađeno' ? 'status-done' : a.status==='otkazano' ? 'status-cancelled' : 'status-scheduled';
      const catDot = s ? `<span class="cat-dot ${s.cat}"></span>` : '';
      html += `<div class="card ${statusClass}" onclick="openApptDetail('${a.id}')">
        <div class="row1">
          <div>
            <div class="time">${a.time}</div>
            <div class="client-name">${c?c.name:'(klijentica obrisana)'}</div>
            <div class="svc">${catDot}${s?s.name:''}</div>
          </div>
          <div class="price">${euro(a.price)}</div>
        </div>
        <div class="tags">
          ${a.status==='otkazano'?'<span class="chip danger">Otkazano</span>':a.status==='odrađeno'?'<span class="chip ghost">Odrađeno</span>':'<span class="chip">Zakazano</span>'}
          ${a.duration?`<span class="chip ghost">${a.duration} min</span>`:''}
        </div>
      </div>`;
    });
  }
  mainEl.innerHTML = html;
}
function shiftDay(n){ currentDay.setDate(currentDay.getDate()+n); render(); }
function goToday(){ currentDay = new Date(); currentDay.setHours(0,0,0,0); render(); }

function openApptDetail(id){
  const a = DB.appointments.find(x=>x.id===id);
  const c = clientById(a.clientId); const s = serviceById(a.serviceId);
  showSheet(`
    <h2>${c?c.name:''} <button onclick="closeSheet()">✕</button></h2>
    <div class="helper" style="margin-top:-8px; margin-bottom:14px;">${a.date.split('-').reverse().join('.')} u ${a.time}h · ${s?s.name:''}</div>
    <div class="row2">
      <a class="btn primary" style="margin-top:0; display:block; text-align:center; text-decoration:none; box-sizing:border-box;" href="${icsCalLink(a)}" target="_blank" rel="noopener">📅 Dodaj u Kalendar</a>
    </div>
    <label>Bilješka</label>
    <textarea id="apptNote" oninput="a_${a.id}_note=this.value">${a.note||''}</textarea>
    <label>Status</label>
    <div class="service-pick">
      <div class="opt ${a.status==='zakazano'?'sel':''}" onclick="setApptStatus('${a.id}','zakazano')">Zakazano</div>
      <div class="opt ${a.status==='odrađeno'?'sel':''}" onclick="setApptStatus('${a.id}','odrađeno')">Odrađeno</div>
      <div class="opt ${a.status==='otkazano'?'sel':''}" onclick="setApptStatus('${a.id}','otkazano')">Otkazano</div>
    </div>
    <button class="btn secondary" onclick="saveApptNote('${a.id}')">Spremi bilješku</button>
    <button class="btn danger-text" onclick="deleteAppt('${a.id}')">Obriši termin</button>
  `);
}
function saveApptNote(id){
  const a = DB.appointments.find(x=>x.id===id);
  a.note = document.getElementById('apptNote').value;
  saveDB(); closeSheet(); toast('Spremljeno');
}
function setApptStatus(id, status){
  const a = DB.appointments.find(x=>x.id===id);
  a.status = status; saveDB(); closeSheet(); render(); toast('Status ažuriran');
}
function deleteAppt(id){
  if(!confirm('Obrisati termin?')) return;
  DB.appointments = DB.appointments.filter(a=>a.id!==id);
  saveDB(); closeSheet(); render();
}

/* ===================== NEW APPOINTMENT ===================== */
function openNewAppt(){
  const clientOpts = DB.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const svcOpts = DB.services.map(s=>`<option value="${s.id}" data-price="${s.price}" data-dur="${s.duration}">${s.name} — ${euro(s.price)}</option>`).join('');
  showSheet(`
    <h2>Novi termin <button onclick="closeSheet()">✕</button></h2>
    <label>Klijentica</label>
    <select id="na_client">
      <option value="">— odaberi —</option>
      ${clientOpts}
      <option value="__new__">+ Nova klijentica</option>
    </select>
    <div id="na_newClientBox" style="display:none;">
      <label>Ime nove klijentice</label>
      <input type="text" id="na_newClientName" placeholder="Ime i prezime">
      <label>Telefon (opcionalno)</label>
      <input type="tel" id="na_newClientPhone" placeholder="09X...">
    </div>
    <label>Usluga</label>
    <select id="na_service" onchange="naServiceChanged()">
      <option value="">— odaberi —</option>
      ${svcOpts}
    </select>
    <div class="row2">
      <div><label>Datum</label><input type="date" id="na_date" value="${toISODate(currentDay)}"></div>
      <div><label>Vrijeme</label><input type="time" id="na_time" value="10:00"></div>
    </div>
    <div class="row2">
      <div><label>Trajanje (min)</label><input type="number" id="na_dur" value="45"></div>
      <div><label>Cijena (€)</label><input type="number" id="na_price" value="12" step="0.5"></div>
    </div>
    <label>Bilješka</label>
    <textarea id="na_note" placeholder="npr. alergija na aceton, želi svjetliju nijansu..."></textarea>
    <button class="btn primary" onclick="saveNewAppt()">Spremi termin</button>
    <div class="helper">Nakon spremanja moći ćeš odmah dodati termin u Apple Kalendar s podsjetnikom 30 min prije.</div>
  `);
  document.getElementById('na_client').addEventListener('change', function(){
    document.getElementById('na_newClientBox').style.display = this.value==='__new__' ? 'block':'none';
  });
}
function naServiceChanged(){
  const sel = document.getElementById('na_service');
  const opt = sel.options[sel.selectedIndex];
  if(opt.dataset.price) document.getElementById('na_price').value = opt.dataset.price;
  if(opt.dataset.dur) document.getElementById('na_dur').value = opt.dataset.dur;
}
function saveNewAppt(){
  let clientId = document.getElementById('na_client').value;
  const serviceId = document.getElementById('na_service').value;
  const date = document.getElementById('na_date').value;
  const time = document.getElementById('na_time').value;
  if(!serviceId || !date || !time){ toast('Popuni uslugu, datum i vrijeme'); return; }
  if(clientId==='__new__'){
    const name = document.getElementById('na_newClientName').value.trim();
    if(!name){ toast('Upiši ime klijentice'); return; }
  } else if(!clientId){ toast('Odaberi klijenticu'); return; }
  const duration = parseInt(document.getElementById('na_dur').value)||45;
  const overlap = findOverlap(date, time, duration, null);
  if(overlap){
    const oc = clientById(overlap.clientId);
    const proceed = confirm(`⚠️ Preklapanje: ${oc?oc.name:'klijentica'} već ima termin u ${overlap.time}h. Spremiti ovaj termin ipak?`);
    if(!proceed) return;
  }
  if(clientId==='__new__'){
    const name = document.getElementById('na_newClientName').value.trim();
    const nc = {id:uid(), name, phone:document.getElementById('na_newClientPhone').value.trim(), notes:'', createdAt:Date.now()};
    DB.clients.push(nc); clientId = nc.id;
  }
  const appt = {
    id: uid(), clientId, serviceId, date, time,
    duration,
    price: parseFloat(document.getElementById('na_price').value)||0,
    note: document.getElementById('na_note').value,
    status: 'zakazano'
  };
  DB.appointments.push(appt);
  saveDB();
  closeSheet();
  currentDay = new Date(date+'T00:00:00');
  render();
  setTimeout(()=>{
    showSheet(`
      <h2>Termin spremljen ✓ <button onclick="closeSheet()">✕</button></h2>
      <p class="helper" style="margin-bottom:16px;">Dodaj termin u Apple Kalendar da dobiješ podsjetnik 30 min prije.</p>
      <a class="btn primary" style="display:block; text-align:center; text-decoration:none; box-sizing:border-box;" href="${icsCalLink(appt)}" target="_blank" rel="noopener" onclick="setTimeout(closeSheet,300)">📅 Dodaj u Kalendar</a>
      <button class="btn secondary" onclick="closeSheet()">Ne sada</button>
    `);
  }, 250);
}

/* ===================== TAB: KLIJENTI ===================== */
let clientSearch = '';
function renderKlijenti(){
  let html = `<input class="search-bar" placeholder="Pretraži klijentice..." value="${clientSearch}" oninput="clientSearch=this.value; renderKlijenti()">`;
  const list = DB.clients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase()))
    .sort((a,b)=>a.name.localeCompare(b.name));
  if(list.length===0){
    html += `<div class="empty"><span class="big">👤</span><p>Još nema klijentica.</p><p>Dodaju se automatski kod novog termina, ili ih dodaj ovdje.</p></div>
    <button class="btn secondary" onclick="openNewClient()">+ Dodaj klijenticu</button>`;
  } else {
    list.forEach(c=>{
      const hist = DB.appointments.filter(a=>a.clientId===c.id);
      const last = hist.sort((a,b)=>b.date.localeCompare(a.date))[0];
      html += `<div class="list-row" onclick="openClientDetail('${c.id}')">
        <div>
          <div class="name">${c.name}</div>
          <div class="meta">${c.phone||'bez broja'} · ${hist.length} termina</div>
        </div>
        <div class="right"><div class="num" style="color:var(--plum-soft); font-size:11.5px;">${last?last.date.split('-').reverse().join('.'):''}</div></div>
      </div>`;
    });
    html += `<button class="btn secondary" onclick="openNewClient()">+ Dodaj klijenticu</button>`;
  }
  mainEl.innerHTML = html;
}
function openNewClient(){
  showSheet(`
    <h2>Nova klijentica <button onclick="closeSheet()">✕</button></h2>
    <label>Ime i prezime</label><input type="text" id="nc_name">
    <label>Telefon</label><input type="tel" id="nc_phone">
    <label>Bilješke (alergije, preferencije...)</label><textarea id="nc_notes"></textarea>
    <button class="btn primary" onclick="saveNewClient()">Spremi</button>
  `);
}
function saveNewClient(){
  const name = document.getElementById('nc_name').value.trim();
  if(!name){ toast('Upiši ime'); return; }
  DB.clients.push({id:uid(), name, phone:document.getElementById('nc_phone').value.trim(), notes:document.getElementById('nc_notes').value, createdAt:Date.now()});
  saveDB(); closeSheet(); renderKlijenti(); toast('Klijentica dodana');
}
function openClientDetail(id){
  const c = clientById(id);
  const hist = DB.appointments.filter(a=>a.clientId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const total = hist.filter(a=>a.status!=='otkazano').reduce((s,a)=>s+a.price,0);
  let histHtml = hist.map(a=>{
    const s = serviceById(a.serviceId);
    return `<div class="client-hist">
      <div class="h1"><span>${s?s.name:''}</span><span>${euro(a.price)}</span></div>
      <div class="h2">${a.date.split('-').reverse().join('.')} · ${a.status}</div>
    </div>`;
  }).join('') || '<p class="helper">Nema još termina.</p>';
  showSheet(`
    <h2>${c.name} <button onclick="closeSheet()">✕</button></h2>
    <div class="stat-grid" style="margin-top:0;">
      <div class="stat-card"><div class="n">${hist.length}</div><div class="l">termina</div></div>
      <div class="stat-card"><div class="n" style="font-size:18px;">${euro(total)}</div><div class="l">ukupno potrošeno</div></div>
    </div>
    <label>Telefon</label><input type="tel" id="cd_phone" value="${c.phone||''}">
    <label>Bilješke</label><textarea id="cd_notes">${c.notes||''}</textarea>
    <button class="btn secondary" onclick="saveClientEdit('${c.id}')">Spremi izmjene</button>
    <div class="section-title" style="margin-top:20px; font-size:15px;">Povijest termina</div>
    ${histHtml}
    <button class="btn danger-text" onclick="deleteClient('${c.id}')">Obriši klijenticu</button>
  `);
}
function saveClientEdit(id){
  const c = clientById(id);
  c.phone = document.getElementById('cd_phone').value.trim();
  c.notes = document.getElementById('cd_notes').value;
  saveDB(); closeSheet(); renderKlijenti(); toast('Spremljeno');
}
function deleteClient(id){
  if(!confirm('Obrisati klijenticu i njenu povijest termina ostaje zapisana, ali bez imena. Nastaviti?')) return;
  DB.clients = DB.clients.filter(c=>c.id!==id);
  saveDB(); closeSheet(); renderKlijenti();
}

/* ===================== TAB: USLUGE ===================== */
function renderUsluge(){
  let html = '';
  if(DB.services.length===0){
    html += `<div class="empty"><span class="big">💅</span><p>Nema dodanih usluga.</p></div>`;
  } else {
    DB.services.forEach(s=>{
      html += `<div class="list-row" onclick="openServiceEdit('${s.id}')">
        <div><div class="name">${s.name}</div><div class="meta">${s.duration} min · ${s.cat==='mani'?'manikura':s.cat==='pedi'?'pedikura':'ostalo'}</div></div>
        <div class="right"><div class="num">${euro(s.price)}</div></div>
      </div>`;
    });
  }
  html += `<button class="btn secondary" onclick="openServiceEdit(null)">+ Dodaj uslugu</button>`;
  mainEl.innerHTML = html;
}
function openServiceEdit(id){
  const s = id ? serviceById(id) : {name:'',price:'',duration:45,cat:'mani'};
  showSheet(`
    <h2>${id?'Uredi uslugu':'Nova usluga'} <button onclick="closeSheet()">✕</button></h2>
    <label>Naziv</label><input type="text" id="sv_name" value="${s.name}">
    <div class="row2">
      <div><label>Cijena (€)</label><input type="number" id="sv_price" value="${s.price}" step="0.5"></div>
      <div><label>Trajanje (min)</label><input type="number" id="sv_dur" value="${s.duration}"></div>
    </div>
    <label>Kategorija</label>
    <div class="service-pick">
      <div class="opt ${s.cat==='mani'?'sel':''}" onclick="pickCat(this,'mani')">Manikura</div>
      <div class="opt ${s.cat==='pedi'?'sel':''}" onclick="pickCat(this,'pedi')">Pedikura</div>
      <div class="opt ${s.cat==='other'?'sel':''}" onclick="pickCat(this,'other')">Ostalo</div>
    </div>
    <input type="hidden" id="sv_cat" value="${s.cat}">
    <button class="btn primary" onclick="saveService('${id||''}')">Spremi</button>
    ${id?'<button class="btn danger-text" onclick="deleteService(\''+id+'\')">Obriši uslugu</button>':''}
  `);
}
function pickCat(el, cat){
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel'); document.getElementById('sv_cat').value = cat;
}
function saveService(id){
  const name = document.getElementById('sv_name').value.trim();
  const price = parseFloat(document.getElementById('sv_price').value)||0;
  const duration = parseInt(document.getElementById('sv_dur').value)||30;
  const cat = document.getElementById('sv_cat').value;
  if(!name){ toast('Upiši naziv'); return; }
  if(id){ const s = serviceById(id); s.name=name; s.price=price; s.duration=duration; s.cat=cat; }
  else { DB.services.push({id:uid(), name, price, duration, cat}); }
  saveDB(); closeSheet(); renderUsluge(); toast('Spremljeno');
}
function deleteService(id){
  if(!confirm('Obrisati uslugu?')) return;
  DB.services = DB.services.filter(s=>s.id!==id);
  saveDB(); closeSheet(); renderUsluge();
}

/* ===================== TAB: ZALIHE ===================== */
function renderZalihe(){
  const low = DB.inventory.filter(i=>i.qty<=i.low);
  let html = '';
  if(low.length>0){
    html += `<div class="section-title" style="font-size:15px;">⚠️ Treba nabaviti</div>`;
    low.forEach(i=>html+=invRow(i));
    html += `<div class="section-title" style="font-size:15px; margin-top:18px;">Sve zalihe</div>`;
  }
  const rest = DB.inventory.filter(i=>i.qty>i.low);
  if(DB.inventory.length===0){
    html += `<div class="empty"><span class="big">🧴</span><p>Nema dodanih proizvoda.</p></div>`;
  } else {
    rest.forEach(i=>html+=invRow(i));
  }
  html += `<button class="btn secondary" onclick="openInvEdit(null)">+ Dodaj proizvod</button>`;
  mainEl.innerHTML = html;
}
function invRow(i){
  const cls = i.qty<=0 ? 'outstock' : i.qty<=i.low ? 'lowstock' : '';
  const chip = i.qty<=0 ? '<span class="chip danger">Nema na stanju</span>' : i.qty<=i.low ? '<span class="chip warn">Niska zaliha</span>' : '';
  return `<div class="list-row ${cls}" onclick="openInvEdit('${i.id}')">
    <div><div class="name">${i.name}</div><div class="meta">${chip||('prag: '+i.low+' '+i.unit)}</div></div>
    <div class="right"><div class="num">${i.qty} ${i.unit}</div></div>
  </div>`;
}
function openInvEdit(id){
  const i = id ? itemById(id) : {name:'', qty:1, unit:'kom', low:2};
  showSheet(`
    <h2>${id?'Uredi proizvod':'Novi proizvod'} <button onclick="closeSheet()">✕</button></h2>
    <label>Naziv</label><input type="text" id="iv_name" value="${i.name}">
    <div class="row2">
      <div><label>Trenutna količina</label><input type="number" id="iv_qty" value="${i.qty}"></div>
      <div><label>Jedinica</label><input type="text" id="iv_unit" value="${i.unit}" placeholder="kom / L / ml"></div>
    </div>
    <label>Upozori kad padne na</label><input type="number" id="iv_low" value="${i.low}">
    <div class="row2">
      <button class="btn secondary" style="margin-top:16px;" onclick="adjustQty(-1)">− 1</button>
      <button class="btn secondary" style="margin-top:16px;" onclick="adjustQty(1)">+ 1</button>
    </div>
    <button class="btn primary" onclick="saveInv('${id||''}')">Spremi</button>
    ${id?'<button class="btn danger-text" onclick="deleteInv(\''+id+'\')">Obriši proizvod</button>':''}
  `);
}
function adjustQty(n){
  const el = document.getElementById('iv_qty');
  el.value = Math.max(0, (parseInt(el.value)||0)+n);
}
function saveInv(id){
  const name = document.getElementById('iv_name').value.trim();
  const qty = parseInt(document.getElementById('iv_qty').value)||0;
  const unit = document.getElementById('iv_unit').value.trim()||'kom';
  const low = parseInt(document.getElementById('iv_low').value)||1;
  if(!name){ toast('Upiši naziv'); return; }
  if(id){ const i = itemById(id); i.name=name; i.qty=qty; i.unit=unit; i.low=low; }
  else { DB.inventory.push({id:uid(), name, qty, unit, low}); }
  saveDB(); closeSheet(); renderZalihe(); toast('Spremljeno');
}
function deleteInv(id){
  if(!confirm('Obrisati proizvod?')) return;
  DB.inventory = DB.inventory.filter(i=>i.id!==id);
  saveDB(); closeSheet(); renderZalihe();
}

/* ===================== TAB: PREGLED ===================== */
function renderPregled(){
  const now = new Date();
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay()+1); startOfWeek.setHours(0,0,0,0);
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const done = DB.appointments.filter(a=>a.status!=='otkazano');
  const sum = (arr)=>arr.reduce((s,a)=>s+a.price,0);
  const weekAppts = done.filter(a=>new Date(a.date+'T00:00:00')>=startOfWeek);
  const monthAppts = done.filter(a=>new Date(a.date+'T00:00:00')>=startOfMonth);

  // per weekday totals for this week
  const weekdayTotals = [0,0,0,0,0,0,0]; // mon..sun index 0..6
  weekAppts.forEach(a=>{
    const d = new Date(a.date+'T00:00:00');
    let idx = d.getDay()-1; if(idx<0) idx=6;
    weekdayTotals[idx]+=a.price;
  });
  const maxW = Math.max(1,...weekdayTotals);
  const wLabels = ['Pon','Uto','Sri','Čet','Pet','Sub','Ned'];

  // top services this month
  const svcCount = {};
  monthAppts.forEach(a=>{ svcCount[a.serviceId]=(svcCount[a.serviceId]||0)+1; });
  const topSvc = Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,4);

  let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="n">${euro(sum(weekAppts))}</div><div class="l">zarada ovaj tjedan</div></div>
      <div class="stat-card"><div class="n">${euro(sum(monthAppts))}</div><div class="l">zarada ovaj mjesec</div></div>
      <div class="stat-card"><div class="n">${weekAppts.length}</div><div class="l">termina ovaj tjedan</div></div>
      <div class="stat-card"><div class="n">${DB.clients.length}</div><div class="l">klijentica ukupno</div></div>
    </div>
    <div class="section-title" style="font-size:15px;">Zarada po danima (ovaj tjedan)</div>`;
  wLabels.forEach((l,i)=>{
    html += `<div class="bar-row"><div class="bl">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${(weekdayTotals[i]/maxW*100)||0}%"></div></div><div class="bv">${euro(weekdayTotals[i])}</div></div>`;
  });
  html += `<div class="section-title" style="font-size:15px; margin-top:20px;">Najtraženije usluge (mjesec)</div>`;
  if(topSvc.length===0) html += `<p class="helper">Još nema podataka.</p>`;
  topSvc.forEach(([sid,count])=>{
    const s = serviceById(sid);
    html += `<div class="list-row"><div class="name" style="font-weight:600;">${s?s.name:'—'}</div><div class="num">${count}×</div></div>`;
  });
  mainEl.innerHTML = html;
}

/* ===================== SETTINGS ===================== */
function openSettings(){
  showSheet(`
    <h2>Postavke <button onclick="closeSheet()">✕</button></h2>
    <label>Naziv salona / studija</label>
    <input type="text" id="st_name" value="${DB.salonName}">
    <button class="btn primary" onclick="saveSettings()">Spremi</button>
    <div class="section-title" style="font-size:15px; margin-top:22px;">Sigurnosna kopija</div>
    <p class="helper">Svi podaci se čuvaju samo lokalno na ovom telefonu. Preporučeno je s vremena na vrijeme izvesti kopiju.</p>
    <button class="btn secondary" onclick="exportData()">⬇️ Izvezi podatke (backup)</button>
    <label style="margin-top:16px;">Uvezi podatke iz backupa</label>
    <input type="file" id="importFile" accept="application/json">
    <button class="btn secondary" onclick="importData()">⬆️ Uvezi</button>
  `);
}
function saveSettings(){
  DB.salonName = document.getElementById('st_name').value.trim()||'Studio Termini';
  saveDB(); closeSheet(); render(); toast('Spremljeno');
}
function exportData(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='studio-termini-backup.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},400);
}
function importData(){
  const f = document.getElementById('importFile').files[0];
  if(!f){ toast('Odaberi datoteku'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.clients || !data.appointments){ throw new Error('bad'); }
      DB = data; saveDB(); closeSheet(); render(); toast('Podaci uvezeni');
    }catch(err){ toast('Neispravna datoteka'); }
  };
  reader.readAsText(f);
}

/* ===================== SHEET / MODAL ===================== */
let overlayEl = null;
function showSheet(innerHtml){
  closeSheet();
  overlayEl = document.createElement('div');
  overlayEl.className = 'overlay';
  overlayEl.innerHTML = `<div class="sheet">${innerHtml}</div>`;
  overlayEl.addEventListener('click', (e)=>{ if(e.target===overlayEl) closeSheet(); });
  document.body.appendChild(overlayEl);
}
function closeSheet(){
  if(overlayEl){ overlayEl.remove(); overlayEl=null; }
}

/* ===================== NAV WIRING ===================== */
document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{ activeTab = btn.dataset.tab; render(); });
});
document.getElementById('fabBtn').addEventListener('click', ()=>{
  if(activeTab==='klijenti') openNewClient();
  else if(activeTab==='usluge') openServiceEdit(null);
  else if(activeTab==='zalihe') openInvEdit(null);
  else openNewAppt();
});

render();
</script>
</body>
</html>
